services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-game-bot
    restart: unless-stopped

    env_file:
      - .env

    environment:
      - TZ=Europe/Moscow
      - DB_PATH=/app/data/bot_database.db

    volumes:
      - bot_data:/app/data

    networks:
      - bot-network

networks:
  bot-network:
    driver: bridge

volumes:
  bot_data:
    name: aelita-game-bot-data